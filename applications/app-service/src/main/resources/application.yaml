server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

spring:
  application:
    name: "BackendAccentureReactive"

  # Configuración de Migraciones
  flyway:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/accenture_db}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    enabled: true
    baseline-on-migrate: true

springdoc:
  swagger-ui.path: "/v3/swagger-ui.html"
  api-docs.path: "/v3/api-docs"

cors:
  allowed-origins: ${CORS_ALLOWED:http://localhost:4200,http://localhost:8080}

adapters:
  r2dbc:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:accenture_db}
    schema: ${DB_SCHEMA:public}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}
    password: ${REDIS_PASSWORD:}
    ssl: ${REDIS_SSL:false}
    connect-timeout: ${REDIS_CONNECT_TIMEOUT:3s}
    command-timeout: ${REDIS_COMMAND_TIMEOUT:3s}
    key-prefix: ${REDIS_KEY_PREFIX:accenture}
    idempotency-in-progress-ttl: ${REDIS_IDEMPOTENCY_IN_PROGRESS_TTL:30s}
    idempotency-completed-ttl: ${REDIS_IDEMPOTENCY_COMPLETED_TTL:24h}
    franquicia-by-id-ttl: ${REDIS_FRANQUICIA_BY_ID_TTL:10m}
    franquicia-all-ttl: ${REDIS_FRANQUICIA_ALL_TTL:2m}
