name: Terraform GitOps

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-gitops.yml'
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-gitops.yml'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  TF_IN_AUTOMATION: true

jobs:
  terraform-pr:
    name: Terraform PR Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug OIDC claims
        if: ${{ vars.DEBUG_OIDC == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC context no disponible en este job"
            exit 0
          fi

          token_response=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          jwt=$(python3 -c "import sys,json; print(json.load(sys.stdin)['value'])" <<< "$token_response")

          python3 - <<'PY' "$jwt"
import base64
import json
import sys

jwt = sys.argv[1]
parts = jwt.split('.')
if len(parts) < 2:
    raise SystemExit('JWT inválido')
payload = parts[1]
padding = '=' * (-len(payload) % 4)
claims = json.loads(base64.urlsafe_b64decode(payload + padding).decode('utf-8'))
for key in ("iss", "aud", "sub", "ref", "repository", "job_workflow_ref", "environment"):
    print(f"{key}: {claims.get(key)}")
PY

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_TERRAFORM || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-terraform-pr
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=env/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TFSTATE_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

      - name: Terraform Plan
        run: |
          terraform -chdir=terraform plan -no-color -out=tfplan > terraform/plan.txt

      - name: Comment Terraform plan in PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = `## Terraform Plan (dev)\n\n\
            <details><summary>Expand plan</summary>\n\n\
            \`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n\
            </details>`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  terraform-apply:
    name: Terraform Apply Dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug OIDC claims
        if: ${{ vars.DEBUG_OIDC == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC context no disponible en este job"
            exit 0
          fi

          token_response=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          jwt=$(python3 -c "import sys,json; print(json.load(sys.stdin)['value'])" <<< "$token_response")

          python3 - <<'PY' "$jwt"
import base64
import json
import sys

jwt = sys.argv[1]
parts = jwt.split('.')
if len(parts) < 2:
    raise SystemExit('JWT inválido')
payload = parts[1]
padding = '=' * (-len(payload) % 4)
claims = json.loads(base64.urlsafe_b64decode(payload + padding).decode('utf-8'))
for key in ("iss", "aud", "sub", "ref", "repository", "job_workflow_ref", "environment"):
    print(f"{key}: {claims.get(key)}")
PY

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_TERRAFORM || vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-terraform-apply
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=env/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TFSTATE_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve
