name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: '25'
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: franchise_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew
      
      - name: Build with Gradle
        run: ./gradlew clean classes --no-daemon --exclude-task validateStructure
      
      - name: Run tests (temporarily skipped)
        run: echo "Tests temporalmente deshabilitados en CI."
      
      - name: Package application
        run: ./gradlew :app-service:bootJar -x test --no-daemon --exclude-task validateStructure
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: accenture-app-jar
          path: applications/app-service/build/libs/*.jar
          retention-days: 7
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew
      
      - name: Run vulnerability scan (Trivy FS)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
  
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug OIDC claims
        if: ${{ vars.DEBUG_OIDC == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC context no disponible en este job"
            exit 0
          fi

          token_response=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          jwt=$(python3 -c "import sys,json; print(json.load(sys.stdin)['value'])" <<< "$token_response")
            python3 -c "import base64,json,sys; parts=sys.argv[1].split('.'); assert len(parts)>=2, 'JWT invalido'; payload=parts[1] + '=' * (-len(parts[1]) % 4); claims=json.loads(base64.urlsafe_b64decode(payload).decode('utf-8')); [print(f'{k}: {claims.get(k)}') for k in ('iss','aud','sub','ref','repository','job_workflow_ref','environment')]" "$jwt"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-franchise-api-docker
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/franchise-api:latest
            ${{ steps.login-ecr.outputs.registry }}/franchise-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug OIDC claims
        if: ${{ vars.DEBUG_OIDC == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC context no disponible en este job"
            exit 0
          fi

          token_response=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          jwt=$(python3 -c "import sys,json; print(json.load(sys.stdin)['value'])" <<< "$token_response")
            python3 -c "import base64,json,sys; parts=sys.argv[1].split('.'); assert len(parts)>=2, 'JWT invalido'; payload=parts[1] + '=' * (-len(parts[1]) % 4); claims=json.loads(base64.urlsafe_b64decode(payload).decode('utf-8')); [print(f'{k}: {claims.get(k)}') for k in ('iss','aud','sub','ref','repository','job_workflow_ref','environment')]" "$jwt"
      
      - name: Debug - Check Deploy Variables
        run: |
          echo "🔍 Verificando configuración para deploy..."
          echo "AWS_REGION: ${{ env.AWS_REGION }}"
          echo "ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}"
          echo "ECS_SERVICE: ${{ vars.ECS_SERVICE }}"
          echo "OIDC role configured: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: gha-franchise-api-deploy
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          
          echo "Deployment initiated successfully"
          echo "Image SHA: ${{ github.sha }}"
          echo "Cluster: ${{ vars.ECS_CLUSTER }}"
          echo "Service: ${{ vars.ECS_SERVICE }}"
