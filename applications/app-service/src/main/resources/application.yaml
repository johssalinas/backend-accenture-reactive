server:
  port: ${PORT:8080}

spring:
  application:
    name: "BackendAccentureReactive"

  # Configuración de Migraciones
  flyway:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/accenture_db}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    enabled: true
    baseline-on-migrate: true

springdoc:
  swagger-ui.path: "/v3/swagger-ui.html"
  api-docs.path: "/v3/api-docs"

cors:
  allowed-origins: ${CORS_ALLOWED:http://localhost:4200,http://localhost:8080}

adapters:
  r2dbc:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:accenture_db}
    schema: ${DB_SCHEMA:public}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}